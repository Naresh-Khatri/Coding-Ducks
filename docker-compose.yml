# Local development only. Not used for production.
#
#   docker compose up -d db redis   # deps only; run `pnpm dev` on the host
#   docker compose up -d            # full stack incl. the app container
services:
  db:
    image: postgres:15-alpine
    container_name: codingducks-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d codingducks"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - POSTGRES_USER=dev
      - POSTGRES_PASSWORD=dev
      - POSTGRES_DB=codingducks
    networks:
      - codingducks-network

  redis:
    image: redis:7-alpine
    container_name: codingducks-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 256mb
    networks:
      - codingducks-network

  turbo:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: turbo-dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - TURBO_TELEMETRY_DISABLED=1
      # Override connection strings to use internal docker hostnames so that
      # .env can keep "localhost" values for running `pnpm dev` on the host.
      - POSTGRES_URL=postgres://dev:dev@db:5432/codingducks
      - REDIS_URL=redis://redis:6379
    command: pnpm dev
    privileged: true
    depends_on:
      - db
      - redis
    networks:
      - codingducks-network

volumes:
  postgres_data:
  redis_data:

networks:
  codingducks-network:
    driver: bridge
